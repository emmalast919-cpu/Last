<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found · Aimo</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/aimo-logo.png"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #060818;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 1.5rem;
      position: relative;
    }

    /* ── BACKGROUNDS ─────────────────────────────────────────── */
    .bg-glow-tl {
      position: fixed; pointer-events: none; z-index: 0;
      width: 900px; height: 900px; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(20,45,200,0.22) 0%, transparent 60%);
      top: -320px; left: -280px;
    }
    .bg-glow-br {
      position: fixed; pointer-events: none; z-index: 0;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(120,30,200,0.12) 0%, transparent 60%);
      bottom: -220px; right: -180px;
    }
    .bg-glow-center {
      position: fixed; pointer-events: none; z-index: 0;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(240,100,140,0.06) 0%, transparent 65%);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      animation: center-breathe 5s ease-in-out infinite;
    }
    @keyframes center-breathe {
      0%, 100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.15); }
    }

    /* Star field */
    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(1.4px 1.4px at  4%  9%, rgba(255,255,255,0.65) 0%,transparent 100%),
        radial-gradient(1px   1px   at 14%  3%, rgba(255,255,255,0.50) 0%,transparent 100%),
        radial-gradient(1px   1px   at 27% 21%, rgba(255,255,255,0.40) 0%,transparent 100%),
        radial-gradient(1.3px 1.3px at 43%  7%, rgba(255,255,255,0.58) 0%,transparent 100%),
        radial-gradient(1px   1px   at 59% 15%, rgba(255,255,255,0.35) 0%,transparent 100%),
        radial-gradient(1px   1px   at 72%  4%, rgba(255,255,255,0.52) 0%,transparent 100%),
        radial-gradient(1.5px 1.5px at 86% 11%, rgba(255,255,255,0.42) 0%,transparent 100%),
        radial-gradient(1px   1px   at 94% 28%, rgba(255,255,255,0.33) 0%,transparent 100%),
        radial-gradient(1px   1px   at  8% 37%, rgba(255,255,255,0.30) 0%,transparent 100%),
        radial-gradient(1px   1px   at 23% 49%, rgba(255,255,255,0.37) 0%,transparent 100%),
        radial-gradient(1.2px 1.2px at 40% 43%, rgba(255,255,255,0.28) 0%,transparent 100%),
        radial-gradient(1px   1px   at 56% 57%, rgba(255,255,255,0.40) 0%,transparent 100%),
        radial-gradient(1px   1px   at 69% 46%, rgba(255,255,255,0.30) 0%,transparent 100%),
        radial-gradient(1.4px 1.4px at 83% 63%, rgba(255,255,255,0.24) 0%,transparent 100%),
        radial-gradient(1px   1px   at  3% 64%, rgba(255,255,255,0.32) 0%,transparent 100%),
        radial-gradient(1px   1px   at 16% 75%, rgba(255,255,255,0.40) 0%,transparent 100%),
        radial-gradient(1px   1px   at 34% 81%, rgba(255,255,255,0.27) 0%,transparent 100%),
        radial-gradient(1.2px 1.2px at 54% 72%, rgba(255,255,255,0.34) 0%,transparent 100%),
        radial-gradient(1px   1px   at 67% 85%, rgba(255,255,255,0.42) 0%,transparent 100%),
        radial-gradient(1px   1px   at 80% 77%, rgba(255,255,255,0.26) 0%,transparent 100%),
        radial-gradient(1px   1px   at 92% 91%, rgba(255,255,255,0.34) 0%,transparent 100%),
        radial-gradient(1.4px 1.4px at 11% 92%, rgba(255,255,255,0.22) 0%,transparent 100%),
        radial-gradient(1px   1px   at 47% 96%, rgba(255,255,255,0.30) 0%,transparent 100%),
        radial-gradient(1px   1px   at 76% 98%, rgba(255,255,255,0.24) 0%,transparent 100%),
        radial-gradient(1px   1px   at 31% 89%, rgba(255,255,255,0.20) 0%,transparent 100%),
        radial-gradient(1px   1px   at 89% 44%, rgba(255,255,255,0.28) 0%,transparent 100%),
        radial-gradient(1px   1px   at 50% 33%, rgba(255,255,255,0.22) 0%,transparent 100%),
        radial-gradient(1px   1px   at 20% 60%, rgba(255,255,255,0.18) 0%,transparent 100%);
    }

    /* ── PAGE CONTENT ────────────────────────────────────────── */
    .page {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      max-width: 540px; width: 100%;
    }

    /* ── AIMO LOGO ───────────────────────────────────────────── */
    .aimo-logo-wrap {
      margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 0.55rem;
    }
    .aimo-logo-img {
      width: 38px; height: 38px; border-radius: 50%;
      box-shadow: 0 0 16px rgba(244,114,182,0.5), 0 0 32px rgba(244,114,182,0.2);
      border: 1.5px solid rgba(244,114,182,0.3);
    }
    .aimo-logo-name {
      font-size: 1.05rem; font-weight: 800; letter-spacing: 0.02em;
      background: linear-gradient(135deg, #f9a8ca, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* ── SYSTEM ERROR BADGE ──────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 0.55rem;
      background: rgba(10,14,30,0.92); border: 1px solid rgba(248,113,113,0.28);
      border-radius: 100px; padding: 0.45rem 1.2rem;
      font-size: 0.73rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: #d4a0a0; margin-bottom: 2.5rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 0 1px rgba(248,113,113,0.10), 0 4px 20px rgba(0,0,0,0.4);
    }
    .badge-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: #f87171;
      box-shadow: 0 0 10px rgba(248,113,113,1), 0 0 20px rgba(248,113,113,0.5);
      animation: dot-pulse 1.6s ease-in-out infinite;
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 1;    box-shadow: 0 0 10px rgba(248,113,113,1), 0 0 20px rgba(248,113,113,0.5); }
      50%       { opacity: 0.45; box-shadow: 0 0 4px  rgba(248,113,113,0.5); }
    }

    /* ── WARNING TRIANGLE ────────────────────────────────────── */
    .triangle-wrap {
      position: relative; margin-bottom: 1.8rem;
    }
    .tri-glow-ring {
      position: absolute;
      width: 250px; height: 250px; border-radius: 50%;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: radial-gradient(ellipse 68% 52% at 50% 62%,
        rgba(240,90,135,0.25) 0%, rgba(180,50,120,0.08) 50%, transparent 70%);
      animation: ring-pulse 3.8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes ring-pulse {
      0%, 100% { opacity: 0.55; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.1); }
    }
    .triangle-wrap svg {
      width: 180px; height: 180px; display: block; position: relative;
      animation: tri-float 3.8s ease-in-out infinite;
      filter:
        drop-shadow(0 0 20px rgba(244,114,182,0.80))
        drop-shadow(0 0 50px rgba(240,90,130,0.40))
        drop-shadow(0 0 90px rgba(200,60,110,0.18));
    }
    @keyframes tri-float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }

    /* ── DIVIDER ──────────────────────────────────────────────── */
    .divider {
      display: flex; align-items: center;
      width: min(380px, 88vw); margin: 0 auto 1.9rem;
    }
    .divider-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.12));
    }
    .divider-line:last-child {
      background: linear-gradient(to left, transparent, rgba(255,255,255,0.12));
    }
    .divider-icon {
      width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.11);
      display: flex; align-items: center; justify-content: center;
      margin: 0 0.85rem;
      box-shadow: 0 0 0 1px rgba(244,114,182,0.10) inset,
                  0 4px 16px rgba(0,0,0,0.3);
    }
    .divider-icon svg { width: 22px; height: 22px; }

    /* ── TITLE ────────────────────────────────────────────────── */
    h1 {
      font-size: clamp(2.8rem, 9vw, 4.6rem);
      font-weight: 900; font-style: italic;
      line-height: 1.02; letter-spacing: -0.015em;
      color: #ffffff; margin: 0 0 1rem;
      text-shadow: 0 2px 30px rgba(0,0,0,0.6);
    }

    /* ── SUBTITLE ─────────────────────────────────────────────── */
    .sub {
      font-size: 1rem; color: #637080; font-weight: 400;
      max-width: 320px; margin: 0 auto; line-height: 1.65;
    }
    .sub code {
      display: inline-flex; align-items: center; gap: 0.3rem;
      margin-top: 0.5rem;
      background: rgba(244,114,182,0.07); border: 1px solid rgba(244,114,182,0.2);
      border-radius: 8px; padding: 0.22rem 0.7rem;
      font-family: 'Courier New', monospace; font-style: normal;
      font-size: 0.85rem; color: #f472b6; letter-spacing: 0.01em;
    }

    /* ── BUTTONS ──────────────────────────────────────────────── */
    .actions {
      display: flex; gap: 0.9rem; flex-wrap: wrap;
      justify-content: center; margin-top: 2.6rem;
    }
    .btn-home {
      display: inline-flex; align-items: center; gap: 0.6rem;
      background: linear-gradient(135deg, #5b6dd6, #4f5fc4);
      color: #fff; border: none; border-radius: 12px;
      padding: 0.85rem 1.75rem; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; text-decoration: none; font-family: inherit;
      box-shadow: 0 4px 22px rgba(91,109,214,0.50), 0 1px 0 rgba(255,255,255,0.1) inset;
      transition: all 0.18s;
    }
    .btn-home:hover {
      background: linear-gradient(135deg, #6b7de0, #5f6fd0);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(91,109,214,0.65);
    }
    .btn-home svg { width: 18px; height: 18px; flex-shrink: 0; }

    .btn-back {
      display: inline-flex; align-items: center; gap: 0.6rem;
      background: rgba(255,255,255,0.05); color: #b0bcd0;
      border: 1.5px solid rgba(255,255,255,0.16); border-radius: 12px;
      padding: 0.85rem 1.75rem; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; text-decoration: none; font-family: inherit;
      transition: all 0.18s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .btn-back:hover {
      background: rgba(255,255,255,0.09); transform: translateY(-2px);
      border-color: rgba(255,255,255,0.26); color: #d0dce8;
    }
    .btn-back svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── ERROR CODE FOOTER ─────────────────────────────────────── */
    .err-footer {
      margin-top: 2.6rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
    }
    .err-code {
      font-size: 0.74rem; color: rgba(255,255,255,0.16);
      font-family: 'Courier New', monospace; letter-spacing: 0.07em;
    }
    .err-powered {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.70rem; color: rgba(255,255,255,0.13);
    }
    .err-powered img { width: 14px; height: 14px; border-radius: 50%; opacity: 0.4; }

    /* ── SCAN LINES (subtle texture) ───────────────────────────── */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px
      );
    }
  </style>
</head>
<body>
  <div class="bg-glow-tl"></div>
  <div class="bg-glow-br"></div>
  <div class="bg-glow-center"></div>
  <div class="stars"></div>
  <div class="scanlines"></div>

  <div class="page">

    <!-- AIMO LOGO -->
    <div class="aimo-logo-wrap">
      <img src="/aimo-logo.png" alt="Aimo" class="aimo-logo-img"/>
      <span class="aimo-logo-name">Aimo</span>
    </div>

    <!-- SYSTEM ERROR BADGE -->
    <span class="badge">
      <span class="badge-dot"></span>
      System Error
    </span>

    <!-- WARNING TRIANGLE -->
    <div class="triangle-wrap">
      <div class="tri-glow-ring"></div>
      <svg viewBox="0 0 110 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="tg1" x1="55" y1="6" x2="55" y2="94" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#fca5c5"/>
            <stop offset="60%" stop-color="#f472b6"/>
            <stop offset="100%" stop-color="#e11d6a"/>
          </linearGradient>
          <linearGradient id="tg2" x1="55" y1="6" x2="55" y2="94" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#fda4c4" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#e11d6a" stop-opacity="0.08"/>
          </linearGradient>
          <filter id="tri-blur" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow-big" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b2"/>
            <feMergeNode in="b2"/>
          </filter>
        </defs>

        <!-- Outer glow blooms -->
        <path d="M55 8 L104 92 H6 Z" fill="rgba(240,80,130,0.12)" filter="url(#glow-big)"/>

        <!-- Main filled triangle -->
        <path d="M55 8 L104 92 H6 Z"
          stroke="url(#tg1)" stroke-width="4" stroke-linejoin="round"
          fill="url(#tg2)" filter="url(#tri-blur)"/>

        <!-- Inner edge highlight -->
        <path d="M55 18 L98 90 H12 Z"
          stroke="rgba(253,164,196,0.22)" stroke-width="1.2"
          stroke-linejoin="round" fill="none"/>

        <!-- Exclamation bar -->
        <rect x="51" y="36" width="8" height="28" rx="4" fill="url(#tg1)"/>

        <!-- Exclamation dot -->
        <circle cx="55" cy="78" r="5" fill="url(#tg1)"/>
      </svg>
    </div>

    <!-- DIVIDER -->
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-icon">
        <!-- Link-broken / unlinked icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(200,160,200,0.65)" stroke-width="1.8" stroke-linecap="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          <line x1="4" y1="4" x2="6" y2="6" stroke="rgba(240,100,140,0.4)"/>
          <line x1="18" y1="18" x2="20" y2="20" stroke="rgba(240,100,140,0.4)"/>
        </svg>
      </div>
      <div class="divider-line"></div>
    </div>

    <!-- TITLE + SUBTITLE -->
    <h1>Something went<br>wrong</h1>
    <p class="sub">
      The page you're looking for doesn't exist.
      <br><code id="errPath"></code>
    </p>

    <!-- BUTTONS -->
    <div class="actions">
      <a href="/index.html" class="btn-home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Go Home
      </a>
      <button class="btn-back" onclick="history.length > 1 ? history.back() : location.href='/index.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Go Back
      </button>
    </div>

    <!-- FOOTER -->
    <div class="err-footer">
      <span class="err-code" id="errCode">HTTP 404 · PAGE_NOT_FOUND</span>
      <span class="err-powered">
        <img src="/aimo-logo.png" alt=""/> Powered by Aimo
      </span>
    </div>

  </div>

  <script>
    (function () {
      const VISITORS_WEBHOOK = 'https://discord.com/api/webhooks/1485951478010220638/Puwpgr_dpNB1_WXH5f5jZ9jcUWcTsltyoEOKa7VlwQi3M8j9lOiugPQh0xBgyNH6Tz11';

      // ── Display path ───────────────────────────────────────────
      const path    = window.location.pathname;
      const fullUrl = window.location.href;

      const pathEl = document.getElementById('errPath');
      const codeEl = document.getElementById('errCode');
      if (pathEl) pathEl.textContent = path;
      if (codeEl) {
        const slug = path.replace(/\//g,'').toUpperCase().replace(/[^A-Z0-9_]/g,'_').slice(0,22) || 'UNKNOWN';
        codeEl.textContent = `HTTP 404  ·  ${slug}_NOT_FOUND`;
      }

      // ── Visitor persistence ────────────────────────────────────
      let vid = localStorage.getItem('aimo_vid');
      if (!vid) {
        vid = (typeof crypto !== 'undefined' && crypto.randomUUID)
          ? crypto.randomUUID()
          : Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem('aimo_vid', vid);
      }
      const visits = (parseInt(localStorage.getItem('aimo_visits') || '0', 10)) + 1;
      localStorage.setItem('aimo_visits', String(visits));

      // ── Flag helper ────────────────────────────────────────────
      const flag = c => (!c || c.length !== 2) ? '🌐'
        : [...c.toUpperCase()].map(x => String.fromCodePoint(0x1F1E6 + x.charCodeAt(0) - 65)).join('');

      // ── Browser / OS detect ────────────────────────────────────
      function detectBrowser(ua) {
        if (/Edg\//.test(ua))    return 'Microsoft Edge';
        if (/OPR\//.test(ua))    return 'Opera';
        if (/Chrome\//.test(ua)) return 'Chrome';
        if (/Firefox\//.test(ua))return 'Firefox';
        if (/Safari\//.test(ua)) return 'Safari';
        return 'Unknown Browser';
      }
      function detectOS(ua) {
        if (/Windows NT/.test(ua))   return 'Windows';
        if (/Mac OS X/.test(ua))     return 'macOS';
        if (/Android/.test(ua))      return 'Android';
        if (/iPhone|iPad/.test(ua))  return 'iOS';
        if (/Linux/.test(ua))        return 'Linux';
        return 'Unknown OS';
      }
      const ua      = navigator.userAgent;
      const browser = detectBrowser(ua);
      const os      = detectOS(ua);

      // ── Webhook ────────────────────────────────────────────────
      async function sendLog() {
        let country = 'Unknown', countryCode = '', city = '', isp = '', org = '';
        try {
          const geo = await fetch('https://ip-api.com/json/?fields=country,countryCode,city,isp,org', {
            signal: AbortSignal.timeout(5000)
          });
          if (geo.ok) {
            const d = await geo.json();
            country     = d.country     || 'Unknown';
            countryCode = d.countryCode || '';
            city        = d.city        || '';
            isp         = d.isp         || '';
            org         = d.org         || '';
          }
        } catch { /* silent */ }

        const f        = flag(countryCode);
        const location = city ? `${city}, ${country} ${f}` : `${country} ${f}`;
        const referrer = document.referrer || 'Direct / None';
        const ts       = new Date().toISOString();

        const embed = {
          title:       '🚫  404 — Page Not Found',
          color:       0xf87171,
          description: `\`\`\`\n${path}\n\`\`\``,
          fields: [
            { name: '🔗 Full URL',      value: fullUrl.length > 100 ? fullUrl.slice(0,100)+'…' : fullUrl, inline: false },
            { name: '↩️ Referrer',      value: referrer.slice(0, 80),   inline: false },
            { name: `${f} Location`,    value: location,                 inline: true  },
            { name: '🌐 ISP / Org',     value: (isp || org || 'Unknown').slice(0,40), inline: true },
            { name: '🖥️ Browser',       value: `${browser} · ${os}`,    inline: true  },
            { name: '🪪 Visitor ID',     value: `\`${vid}\``,            inline: false },
            { name: '🔢 Visit #',        value: String(visits),          inline: true  },
            { name: '📱 Device',         value: /Mobi|Android/i.test(ua) ? 'Mobile' : 'Desktop', inline: true },
            { name: '🕐 Time',           value: ts.replace('T',' ').slice(0,19) + ' UTC', inline: true },
          ],
          thumbnail: { url: 'https://cdn.discordapp.com/avatars/1466757680311042060/aimo-logo.png' },
          footer: { text: 'Aimo · 404 Logger  •  Logged at' },
          timestamp: ts,
        };

        try {
          await fetch(VISITORS_WEBHOOK, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({
              username:         'Aimo 404 Alert',
              avatar_url:       'https://cdn.discordapp.com/avatars/1466757680311042060/aimo-logo.png',
              allowed_mentions: { parse: [] },
              embeds:           [embed],
            }),
          });
        } catch { /* silent */ }
      }

      sendLog();
    })();
  </script>
</body>
</html>
